services:
  dexi-droneblocks:
    image: droneblocks/dexi-droneblocks:0.13
    container_name: dexi-droneblocks
    ports:
      - "81:3000"
    restart: unless-stopped

  nginx:
    image: nginx
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    network_mode: host
    restart: unless-stopped
